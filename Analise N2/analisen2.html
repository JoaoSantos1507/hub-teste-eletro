<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise N2 - Eletromidia NOC</title>
    
    <link rel="stylesheet" href="../css/style.css">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* Estilos das Tags de Material na Tabela */
        .tag-material {
            display: inline-block;
            background-color: #ffd700; 
            color: #000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 5px;
            margin-right: 5px;
            font-weight: bold;
            word-wrap: break-word;
            white-space: normal;
        }
        
        .light-mode .tag-material {
            background-color: #000; 
            color: #fff;
        }

        /* Estilo para o Menu de Status na Tabela */
        .select-status {
            font-size: 0.8em; 
            padding: 4px; 
            border-radius: 4px; 
            background: var(--bg-surface, #1e1e2d); 
            color: var(--text-main, #fff); 
            border: 1px solid var(--border-color, #333);
            width: 155px;
            cursor: pointer;
        }
        
        .light-mode .select-status {
            background: #fff;
            color: #333;
            border-color: #ccc;
        }
    </style>

    <script>
        if (localStorage.getItem('noc_theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
</head>
<body> 
    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="../index.html" class="logo" style="display: flex; align-items: center;">
                <img src="../img/logo.png" alt="Logo Eletromidia" class="logo-img">
                <h2>NOC <span style="font-weight: 300; font-size: 0.8em; margin-left: 10px; padding-left: 10px; border-left: 1px solid var(--border-color, #ccc);">Análise N2</span></h2>
            </a>
            
            <div style="margin-left: 20px;">
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar OS, ELT, Cód Ponto, Endereço, Ponto, Técnico..." style="min-width: 350px;">
            </div>
        </div>

        <div class="topbar-actions">
            <button id="theme-toggle" class="icon-btn" title="Alternar Tema">
                <i class="ph ph-sun" id="theme-icon"></i> 
            </button>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Admin+NOC&background=ff6600&color=fff" alt="Admin">
            </div>
        </div>
    </header>

    <main class="tool-container">
        <label for="fileUpload" class="dropzone" id="dropArea">
            <i class="ph ph-file-xls"></i>
            <h3>Arraste o relatório N2 aqui ou clique para buscar</h3>
            <p>Aceita arquivos .xlsx, .xls ou .csv</p>
            <input type="file" id="fileUpload" accept=".xlsx, .xls, .csv">
        </label>

        <div class="toolbar" id="toolbar" style="display: none; align-items: center; gap: 15px; flex-wrap: wrap;">
            <div style="min-width: 150px;">
                <select id="filterOrdem" class="form-control">
                    <option value="recentes">Mais Recentes</option>
                    <option value="antigos">Mais Antigos</option>
                </select>
            </div>
            <div style="min-width: 150px;">
                <select id="filterCritico" class="form-control">
                    <option value="">Status: Todos</option>
                    <option value="sim">Apenas Críticos</option>
                </select>
            </div>
            <div style="min-width: 150px;">
                <select id="filterPraca" class="form-control">
                    <option value="">Todas as Praças</option>
                </select>
            </div>
            <div style="min-width: 150px;">
                <select id="filterTecnico" class="form-control">
                    <option value="">Todos os Técnicos</option>
                </select>
            </div>
            <div style="min-width: 150px;">
                <select id="filterMaterial" class="form-control">
                    <option value="">Todos os Materiais</option>
                </select>
            </div>
            <div style="min-width: 150px;">
                <select id="filterMotivo" class="form-control">
                    <option value="">Todos os Motivos</option>
                </select>
            </div>
            
            <div style="flex: 1;"></div> 
            <button class="btn btn-outline"><i class="ph ph-envelope-simple"></i> Enviar Emails</button>
            <button class="btn btn-primary"><i class="ph ph-clipboard-text"></i> Gerar OS Lote</button>
        </div>

        <div class="table-wrapper" id="tableContainer" style="display: none;">
            <table class="noc-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll"></th>
                        <th>OS / Detalhes</th>
                        <th>Cód Ponto</th>
                        <th>Localização</th>
                        <th>Atendimento</th>
                        <th>Histórico</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </main>

    <div id="materialModal" class="modal-overlay">
        <div class="modal-box modal-lg">
            <div class="modal-header">
                <h3><i class="ph ph-toolbox"></i> Materiais do Chamado #<span id="modalOS"></span></h3>
                <button type="button" class="icon-btn" id="btnFecharModalTop" style="font-size: 20px;">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="modal-add-box">
                    <p class="modal-section-title">Adicionar Novo Item</p>
                    
                    <div class="form-row">
                        <div class="form-col-main">
                            <select id="modalSelectLista" class="form-control">
                                <option value="">Selecione um material...</option>
                            </select>
                            <input type="text" id="modalInputNovo" class="form-control" placeholder="Ou digite um material específico...">
                        </div>
                        
                        <div class="form-col-qtd">
                            <div style="font-size: 10px; text-align: center; margin-bottom: 2px; color: var(--text-muted);" id="modalQtdLabel">un</div>
                            <input type="number" id="modalInputQtd" class="form-control" value="1" min="1">
                        </div>
                        
                        <div class="form-col-btn">
                            <button type="button" id="btnAdicionarMaterial" class="btn btn-primary" style="height: 100%; min-height: 82px;">
                                <i class="ph ph-plus" style="font-weight: bold;"></i> Add
                            </button>
                        </div>
                    </div>
                </div>

                <div>
                    <p class="modal-section-title">Itens Vinculados</p>
                    <div id="lista-materiais-corpo" class="vinculados-list custom-scrollbar">
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" id="btnFecharModal" class="btn btn-primary" style="background-color: var(--bg-surface-hover); color: var(--text-main); border: 1px solid var(--border-color);">
                    Concluir
                </button>
            </div>
        </div>
    </div>

    <div id="tratativaModal" class="modal-overlay">
        <div class="modal-box modal-lg">
            <div class="modal-header">
                <h3><i class="ph ph-warning-circle"></i> Motivo / Ocorrência #<span id="modalTratativaOS"></span></h3>
                <button type="button" class="icon-btn" id="btnFecharTratativaTop" style="font-size: 20px;">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="modal-add-box">
                    <p class="modal-section-title">Adicionar Motivo</p>
                    
                    <div class="form-row">
                        <div class="form-col-main">
                            <select id="modalSelectMotivo" class="form-control">
                                <option value="">Selecione um motivo...</option>
                                <option value="Troca de tela">Troca de tela</option>
                                <option value="Problema no LED">Problema no LED</option>
                                <option value="Troca de carcaça">Troca de carcaça</option>
                                <option value="Tela caiu">Tela caiu</option>
                                <option value="Não autorizado">Não autorizado</option>
                                <option value="Sendo tratado pelo atendimento">Sendo tratado pelo atendimento</option>
                                <option value="Aguardando...">Aguardando...</option>
                            </select>
                        </div>
                        
                        <div class="form-col-btn">
                            <button type="button" id="btnAdicionarMotivo" class="btn btn-primary" style="height: 100%; min-height: 45px;">
                                <i class="ph ph-plus" style="font-weight: bold;"></i> Add
                            </button>
                        </div>
                    </div>
                </div>

                <div>
                    <p class="modal-section-title">Motivos Vinculados</p>
                    <div id="lista-motivos-corpo" class="vinculados-list custom-scrollbar">
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" id="btnFecharTratativa" class="btn btn-primary" style="background-color: var(--bg-surface-hover); color: var(--text-main); border: 1px solid var(--border-color);">
                    Concluir
                </button>
            </div>
        </div>
    </div>

    <script src="../scripts/N2/analisen2.js"></script>
    <script src="../scripts/N2/acoes.js"></script>
</body>
</html>
