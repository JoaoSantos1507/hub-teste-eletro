<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NOC Eletromidia</title>
    
    <link rel="stylesheet" href="css/login.css">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="img/logo.png" alt="Logo Eletromidia" class="login-logo" onerror="this.src='https://via.placeholder.com/150x50?text=Logo+NOC'">
                <h2>Acesso ao Painel</h2>
                <p>Insira as suas credenciais para continuar.</p>
            </div>

            <div id="errorMsg" class="error-msg" style="display: none;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Utilizador</label>
                    <div class="input-wrapper">
                        <i class="ph ph-user"></i>
                        <input type="text" id="username" name="username" placeholder="ex: joao.santos" required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Palavra-passe</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" id="btnTogglePassword" class="icon-btn" title="Mostrar Palavra-passe">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span>Entrar no NOC</span>
                    <i class="ph ph-sign-in"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="scripts/Login/login.js"></script>
</body>
</html>
